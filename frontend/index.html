<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="KnowledgeOS - 面向高校与企业的 AI 知识成长与能力运营平台" />
    <title>KnowledgeOS - AI 知识成长平台</title>
  </head>
  <body>
    <div id="app">
      <!-- 首屏加载占位 -->
      <style>
        .app-loading {
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          height: 100vh; background: #f0f2f5; font-family: -apple-system, sans-serif;
        }
        .app-loading .spinner {
          width: 40px; height: 40px; border: 3px solid #e2e8f0;
          border-top-color: #3b82f6; border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }
        .app-loading p { margin-top: 16px; color: #64748b; font-size: 14px; }
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
      <div class="app-loading">
        <div class="spinner"></div>
        <p>正在加载系统...</p>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
